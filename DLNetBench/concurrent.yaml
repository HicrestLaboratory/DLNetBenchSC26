sequential: true

variables:
  nodes:  [32]                # Ensure these are enough for the experiments that will run
  system: ['leonardo']        # Does not matter if placement != runtime
  tasks_per_node: [4]
  cpus_per_task: [8]

  experiment: "ae/" # Change as needed. This shall point to the output directory of the experiments expansion

  extra_flags: ["--debug --keep-files --no-compact"] # Keep these 3 args
  # Add if needed: --nodes-blacklist <list in SLURM format>

  walltime: [200] # 200s. Can be tuned as needed 

jobs:
  - config: "{nodes}_nodes"
    config_jobs:
      - tag: "{experiment_filename}"
        preprocess: "echo \"Allocated nodes: $SLURM_JOB_NODELIST\""
        command: "python workerpool_scheduler.py --walltime {walltime} --nodelist \"$SLURM_JOB_NODELIST\" --tasks-per-node {tasks_per_node} --cpus-per-task {cpus_per_task} --system {system} -p {experiment} {extra_flags}"